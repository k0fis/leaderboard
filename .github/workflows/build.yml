name: Build & Release

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run tests
        run: mvn test -B

      - name: Build fat JAR
        run: mvn package -B -DskipTests

      - name: Rename JAR
        run: cp target/kfsLeaderboard-*.jar kfsLeaderboard.jar

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Build ${{ steps.sha.outputs.short }}
          files: |
            kfsLeaderboard.jar
            kfs-leaderboard.sh
            deploy-kfs-leaderboard.sh
          make_latest: true

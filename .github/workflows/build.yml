name: Build & Release

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run tests
        run: mvn test -B

      - name: Build fat JAR
        run: mvn package -B -DskipTests

      - name: Rename JAR
        run: cp target/kfsLeaderboard-*.jar kfsLeaderboard.jar

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Build ${{ steps.sha.outputs.short }}
          files: |
            kfsLeaderboard.jar
            kfs-leaderboard.sh
            deploy-kfs-leaderboard.sh
          make_latest: true

      - name: Deploy to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          DEST=${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
          SSH="ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }}"
          SCP="scp -i ~/.ssh/deploy_key -P ${{ secrets.DEPLOY_PORT }}"
          $SCP kfsLeaderboard.jar kfs-leaderboard.sh $DEST:/tmp/
          $SSH $DEST '
            cd ~/app/leaderboard &&
            ./kfs-leaderboard.sh stop 2>/dev/null || true &&
            cp kfsLeaderboard.jar kfsLeaderboard.jar.bak &&
            mv /tmp/kfsLeaderboard.jar . &&
            mv /tmp/kfs-leaderboard.sh . &&
            chmod +x kfs-leaderboard.sh &&
            ./kfs-leaderboard.sh start
          '
